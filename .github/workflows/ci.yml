name: CI API

on:
  push:
    branches:
      - develop
    paths:
      - "hotel-booking-api/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "hotel-booking-api/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      LOG_LEVEL: silent
      DB_ENABLED: "true"
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: hotel_booking
      DB_USER: hotel_user
      DB_PASSWORD: hotel_password
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hotel_booking
          POSTGRES_USER: hotel_user
          POSTGRES_PASSWORD: hotel_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hotel_user -d hotel_booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: hotel-booking-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hotel-booking-api/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
        working-directory: .

      - name: Apply schema and seed data
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in hotel-booking-db/db/schema/*.sql; do
            psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -v ON_ERROR_STOP=1 -f "$file"
          done
          for file in hotel-booking-db/db/seeds/*.sql; do
            psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -v ON_ERROR_STOP=1 -f "$file"
          done
        working-directory: .

      - name: Upsert auth test user
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO users (
            id,
            email,
            username,
            first_name,
            last_name,
            password_hash,
            role,
            status,
            created_at,
            updated_at
          )
          VALUES (
            '11111111-1111-4111-8111-111111111111',
            'demo@hotel-booking.local',
            'demo_hotel_booking',
            'Demo',
            'User',
            '$2b$10$ykPYSXKa6FPuqAj9FAsfGuLJA8/2Zwzu9MwW56kT7nCsWXt/DUeZy',
            'customer',
            'active',
            CURRENT_TIMESTAMP,
            CURRENT_TIMESTAMP
          )
          ON CONFLICT (email) DO UPDATE SET
            password_hash = EXCLUDED.password_hash,
            first_name = EXCLUDED.first_name,
            last_name = EXCLUDED.last_name,
            updated_at = CURRENT_TIMESTAMP,
            deleted_at = NULL;
          SQL
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  promote-dev-to-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: api-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create or update PR dev -> main and enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'main';
            const headBranch = 'dev';
            const head = `${owner}:${headBranch}`;

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${headBranch}`
            });

            if (compare.data.status === 'identical') {
              core.info('No changes between dev and main. Skipping PR creation.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head,
              per_page: 1
            });

            let pr = existing.data[0];

            if (!pr) {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: promote dev to main',
                head: headBranch,
                base,
                body: 'Automated PR created after CI passed on dev.'
              });
              pr = created.data;
              core.info(`Created PR #${pr.number} (${pr.html_url})`);
            } else {
              core.info(`PR already open: #${pr.number} (${pr.html_url})`);
            }

            try {
              await github.graphql(
                `
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }
                `,
                { pullRequestId: pr.node_id }
              );
              core.info(`Enabled auto-merge for PR #${pr.number}`);
            } catch (error) {
              core.warning(
                `Could not enable auto-merge for PR #${pr.number}: ${error.message}`
              );
            }
