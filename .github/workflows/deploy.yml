name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "hotel-booking-api/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, Linux, ARM64]
    concurrency:
      group: deploy-api-main
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          API_ENV_FILE_B64: ${{ secrets.API_ENV_FILE_B64 }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for name in API_ENV_FILE_B64 DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write API .env from base64 secret
        env:
          API_ENV_FILE_B64: ${{ secrets.API_ENV_FILE_B64 }}
        run: |
          printf '%s' "${API_ENV_FILE_B64}" | base64 -d > hotel-booking-api/.env
          chmod 600 hotel-booking-api/.env

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload API files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "hotel-booking-api/**"
          target: "${{ secrets.DEPLOY_PATH }}/"
          strip_components: 1
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose down --remove-orphans
            docker compose up -d --build
